name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## v${VERSION}/{found=1; next} /^## v/{found=0} found" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "auto=true" >> $GITHUB_OUTPUT
          else
            echo "auto=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (with changelog)
        if: steps.changelog.outputs.auto == 'false'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md

      - name: Create GitHub Release (auto-generated)
        if: steps.changelog.outputs.auto == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
